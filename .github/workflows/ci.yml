name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:
  lint:
    name: PHP Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: Lint all PHP files
        run: |
          find . -name "*.php" -not -path "./vendor/*" -print0 \
            | xargs -0 -n1 php -l

  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: lint
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    outputs:
      image: ghcr.io/${{ github.repository_owner }}/devops-portfolio:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/devops-portfolio:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/devops-portfolio:latest

      - name: Login to Docker Hub (optional)
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push to Docker Hub (optional)
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/devops-portfolio:latest

  deploy-ssh:
    name: Deploy to server via SSH
    runs-on: ubuntu-latest
    needs: build-and-push
    # Job деңгейінен 'if' шартын алып тастадық, ол төмендегі step-ке көшті
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SSH_USER: ${{ secrets.SSH_USER }}
    steps:
      - name: Deploy via SSH
        # Енді шарт осы жерде орындалады, себеби steps ішінде env толық қолжетімді
        if: github.ref == 'refs/heads/main' && env.SSH_HOST != '' && env.SSH_PRIVATE_KEY != '' && env.SSH_USER != ''
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            # If Docker Hub creds provided, prefer pulling from Docker Hub
            if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ] && [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
              echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin || true
              IMAGE=docker.io/${{ secrets.DOCKERHUB_USERNAME }}/devops-portfolio:latest
            else
              IMAGE=ghcr.io/${{ github.repository_owner }}/devops-portfolio:latest
            fi

            # If GHCR PAT is provided, login to GHCR to pull private image
            if [ -n "${{ secrets.GHCR_PAT }}" ]; then
              echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin || true
            fi

            docker pull "$IMAGE"
            docker stop devops-portfolio || true
            docker rm devops-portfolio || true
            docker run -d --restart=always --name devops-portfolio -p 80:80 "$IMAGE"

version: "3.9"

services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devops-portfolio-php
    restart: unless-stopped
    volumes:
      - ./:/var/www/html
    networks:
      - portfolio-net

  nginx:
    image: nginx:1.27-alpine
    container_name: devops-portfolio-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - portfolio-net

networks:
  portfolio-net:
    driver: bridge
